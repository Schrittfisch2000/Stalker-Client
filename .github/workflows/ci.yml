name: UGREEN Docker CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ugreen-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Anwendung und UGREEN Docker prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAIN_DIRECTORY: /tmp/stalker-client-test
      CONFIG_FILE: /tmp/stalker-client-test/portal-einstellungen.json
      SECRET_FILE: /tmp/stalker-client-test/.stalker-geheimnis
      LOG_FILE: /tmp/stalker-client-test/stalker-client.log

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements.txt

      - name: Versehentlich eingecheckte Geheimnisse erkennen
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)konfiguration/|(^|/)portal-einstellungen\.json$|(^|/)portal-zuweisungen\.json$|(^|/)benutzer(-freigaben)?\.json$|(^|/)\.stalker-geheimnis$|(^|/)stalker-client\.log(\..*)?$'; then
            echo "Laufzeitkonfiguration oder Geheimnisse dürfen nicht versioniert werden."
            exit 1
          fi

      - name: JavaScript-Syntax prüfen
        run: |
          for file in app/static/*.js; do
            node --check "$file"
          done

      - name: Unittests ausführen
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee unittest.log

      - name: Testprotokoll speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: unittest.log
          if-no-files-found: error
          retention-days: 7

      - name: UGREEN-Compose-Datei validieren
        run: docker compose -f docker-compose.yml config >/dev/null

      - name: Docker-Image bauen
        run: docker build --tag stalker-client-ugreen-ci:${{ github.sha }} .

  release-plan:
    name: Docker-Release vorbereiten
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.version.outputs.publish }}
      release_exists: ${{ steps.version.outputs.release_exists }}

    steps:
      - name: Repository vollständig auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker-Hub-Zugang prüfen
        shell: bash
        env:
          HUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$HUB_USERNAME" || -z "$HUB_TOKEN" ]]; then
            echo "DOCKERHUB_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "::warning::Docker-Hub-Zugangsdaten fehlen oder sind für GitHub Actions nicht verfügbar. Publishing wird übersprungen."
          else
            echo "DOCKERHUB_AVAILABLE=true" >> "$GITHUB_ENV"
          fi

      - name: Release-Version und Status ermitteln
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ungültige VERSION: $VERSION"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "${DOCKERHUB_AVAILABLE:-false}" != "true" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-architecture:
    name: Docker-Image ${{ matrix.arch }} nativ bauen
    needs: release-plan
    if: needs.release-plan.outputs.publish == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      IMAGE_NAME: schrittfisch2000/stalker-client

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Bei Docker Hub anmelden
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Native Architektur bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ needs.release-plan.outputs.tag }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.title=Stalker Client für UGREEN NAS
            org.opencontainers.image.version=${{ needs.release-plan.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=stalker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=stalker-${{ matrix.arch }}
          provenance: false
          sbom: false

  publish-manifest:
    name: Multi-Arch-Manifest und Release veröffentlichen
    needs:
      - release-plan
      - build-architecture
    if: needs.release-plan.outputs.publish == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      IMAGE_NAME: schrittfisch2000/stalker-client
      VERSION: ${{ needs.release-plan.outputs.version }}
      TAG: ${{ needs.release-plan.outputs.tag }}

    steps:
      - name: Repository vollständig auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bei Docker Hub anmelden
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Gemeinsames amd64- und arm64-Manifest erstellen
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:$VERSION" \
            --tag "$IMAGE_NAME:$TAG" \
            --tag "$IMAGE_NAME:latest" \
            "$IMAGE_NAME:$TAG-amd64" \
            "$IMAGE_NAME:$TAG-arm64"

      - name: Manifest-Architekturen prüfen
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$IMAGE_NAME:$TAG" --raw > manifest.json
          python - <<'PY'
          import json

          with open("manifest.json", encoding="utf-8") as handle:
              manifest = json.load(handle)

          architectures = {
              platform.get("architecture")
              for item in manifest.get("manifests", [])
              if (platform := item.get("platform", {})).get("os") == "linux"
          }
          missing = {"amd64", "arm64"} - architectures
          if missing:
              raise SystemExit(f"Fehlende Architekturen im Manifest: {sorted(missing)}")
          print("Veröffentlichte Architekturen:", ", ".join(sorted(architectures)))
          PY

      - name: Git-Tag erstellen
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Stalker Client für UGREEN NAS $VERSION"
          git push origin "$TAG"

      - name: GitHub Release erstellen
        if: needs.release-plan.outputs.release_exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_NOTES="RELEASE-${VERSION}.md"
          if [[ -f "$RELEASE_NOTES" ]]; then
            gh release create "$TAG" \
              --verify-tag \
              --title "Stalker Client für UGREEN NAS ${VERSION}" \
              --notes-file "$RELEASE_NOTES"
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "Stalker Client für UGREEN NAS ${VERSION}" \
              --generate-notes
          fi
