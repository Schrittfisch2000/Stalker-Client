name: Docker CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Anwendung und Docker prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAIN_DIRECTORY: /tmp/stalker-client-test
      CONFIG_FILE: /tmp/stalker-client-test/portal-einstellungen.json
      SECRET_FILE: /tmp/stalker-client-test/.stalker-geheimnis
      LOG_FILE: /tmp/stalker-client-test/stalker-client.log

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements.txt

      - name: Versehentlich eingecheckte Geheimnisse erkennen
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)konfiguration/|(^|/)portal-einstellungen\.json$|(^|/)portal-zuweisungen\.json$|(^|/)benutzer(-freigaben)?\.json$|(^|/)\.stalker-geheimnis$|(^|/)stalker-client\.log(\..*)?$'; then
            echo "Laufzeitkonfiguration oder Geheimnisse dürfen nicht versioniert werden."
            exit 1
          fi

      - name: JavaScript-Syntax prüfen
        run: |
          for file in app/static/*.js; do
            node --check "$file"
          done

      - name: Unittests ausführen
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee unittest.log

      - name: Testprotokoll speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: unittest.log
          if-no-files-found: error
          retention-days: 7

      - name: Compose-Datei validieren
        run: docker compose -f docker-compose.yml config >/dev/null

      - name: Docker-Image lokal bauen
        run: docker build --tag stalker-client-ugreen-ci:${{ github.sha }} .

  publish-dockerhub:
    name: Docker Hub Image veröffentlichen
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      IMAGE_NAME: schrittfisch2000/stalker-client

    steps:
      - name: Repository vollständig auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version lesen
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ungültige VERSION: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bei Docker Hub anmelden
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}

      - name: QEMU für arm64 einrichten
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Multi-Arch-Image bauen und veröffentlichen
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.title=Stalker Client für UGREEN NAS
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=stalker-client
          cache-to: type=gha,mode=max,scope=stalker-client
          provenance: false
          sbom: false

      - name: Docker-Hub-Manifest prüfen
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "$IMAGE_NAME:${{ steps.version.outputs.tag }}" --raw > manifest.json
          python - <<'PY'
          import json

          with open("manifest.json", encoding="utf-8") as handle:
              manifest = json.load(handle)

          architectures = {
              platform.get("architecture")
              for item in manifest.get("manifests", [])
              if (platform := item.get("platform", {})).get("os") == "linux"
          }
          missing = {"amd64", "arm64"} - architectures
          if missing:
              raise SystemExit(f"Fehlende Architekturen im Manifest: {sorted(missing)}")
          print("Veröffentlichte Architekturen:", ", ".join(sorted(architectures)))
          PY

      - name: Git-Tag erstellen, falls er fehlt
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Git-Tag $TAG existiert bereits."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$GITHUB_SHA" -m "Stalker Client für UGREEN NAS ${{ steps.version.outputs.version }}"
            git push origin "$TAG"
          fi

      - name: GitHub Release erstellen, falls es fehlt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG existiert bereits."
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "Stalker Client für UGREEN NAS ${VERSION}" \
              --generate-notes
          fi
