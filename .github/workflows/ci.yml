name: UGREEN Docker CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ugreen-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Anwendung und UGREEN Docker prüfen
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAIN_DIRECTORY: /tmp/stalker-client-test
      CONFIG_FILE: /tmp/stalker-client-test/portal-einstellungen.json
      SECRET_FILE: /tmp/stalker-client-test/.stalker-geheimnis
      LOG_FILE: /tmp/stalker-client-test/stalker-client.log

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements.txt

      - name: Versehentlich eingecheckte Geheimnisse erkennen
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)konfiguration/|(^|/)portal-einstellungen\.json$|(^|/)portal-zuweisungen\.json$|(^|/)benutzer(-freigaben)?\.json$|(^|/)\.stalker-geheimnis$|(^|/)stalker-client\.log(\..*)?$'; then
            echo "Laufzeitkonfiguration oder Geheimnisse dürfen nicht versioniert werden."
            exit 1
          fi

      - name: JavaScript-Syntax prüfen
        run: |
          for file in app/static/*.js; do
            node --check "$file"
          done

      - name: Unittests ausführen
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" 2>&1 | tee unittest.log

      - name: Testprotokoll speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: unittest.log
          if-no-files-found: error
          retention-days: 7

      - name: UGREEN-Compose-Datei validieren
        run: docker compose -f docker-compose.yml config >/dev/null

      - name: Docker-Image bauen
        run: docker build --tag stalker-client-ugreen-ci:${{ github.sha }} .

  publish:
    name: UGREEN Multi-Arch-Image veröffentlichen
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
    concurrency:
      group: ugreen-release-${{ github.repository }}
      cancel-in-progress: false
    env:
      IMAGE_NAME: schrittfisch2000/stalker-client

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release-Version und Status ermitteln
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ungültige VERSION: $VERSION"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker-Hub-Zugang prüfen
        if: steps.version.outputs.tag_exists == 'false'
        shell: bash
        env:
          HUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$HUB_USERNAME" || -z "$HUB_TOKEN" ]]; then
            echo "::error::Docker-Hub-Zugangsdaten fehlen oder sind für GitHub Actions nicht verfügbar."
            exit 1
          fi

      - name: Bei Docker Hub anmelden
        if: steps.version.outputs.tag_exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU für UGREEN-Architekturen einrichten
        if: steps.version.outputs.tag_exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx einrichten
        if: steps.version.outputs.tag_exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: UGREEN NAS Multi-Arch-Image bauen und veröffentlichen
        if: steps.version.outputs.tag_exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=Stalker Client für UGREEN NAS
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Git-Tag erstellen
        if: steps.version.outputs.tag_exists == 'false'
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Stalker Client für UGREEN NAS $VERSION"
          git push origin "$TAG"

      - name: GitHub Release erstellen
        if: steps.version.outputs.release_exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --verify-tag \
            --title "Stalker Client für UGREEN NAS ${VERSION}" \
            --generate-notes

      - name: Bereits veröffentlichte Version melden
        if: steps.version.outputs.tag_exists == 'true' && steps.version.outputs.release_exists == 'true'
        run: echo "${{ steps.version.outputs.tag }} ist bereits vollständig veröffentlicht."
