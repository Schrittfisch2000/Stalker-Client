services:
  stalker-client:
    build: .
    container_name: stalker-client
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
