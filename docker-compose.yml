name: stalker-client-deutsch

services:
  stalker-client:
    image: stalker-client-deutsch:lokal
    build:
      context: .
      labels:
        de.stalker-client.beschreibung: "Deutscher Web-Client für Stalker- und MAG-Portale"
        de.stalker-client.version: "lokal"
    container_name: stalker-client-deutsch
    hostname: stalker-client-deutsch
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      MAIN_DIRECTORY: /hauptordner
      CONFIG_FILE: /hauptordner/portal-einstellungen.json
      USERS_FILE: /hauptordner/benutzer.json
      ACCESS_FILE: /hauptordner/benutzer-freigaben.json
      HISTORY_FILE: /hauptordner/wiedergabeverlauf.json
      SECRET_FILE: /hauptordner/.stalker-geheimnis
      LOG_FILE: /hauptordner/stalker-client.log
    volumes:
      - ./:/hauptordner
    ports:
      - "8080:8080"
    labels:
      de.stalker-client.name: "Stalker Client Deutsch"
      de.stalker-client.beschreibung: "Live-TV, Filme und Serien in deutscher Oberfläche"
      de.stalker-client.verwaltung: "docker compose"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
